name: SMC Collector

on:
  schedule:
    - cron: '0 * * * *'    # every hour, on the hour (UTC)
  workflow_dispatch: {}       # lets you trigger a run manually from the Actions tab

permissions:
  contents: write             # needed to commit latest.json back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        env:
          CHART_IMG_KEY: ${{ secrets.CHART_IMG_KEY }}
          CHART_IMG_LAYOUT: ${{ secrets.CHART_IMG_LAYOUT }}
          # data runs hourly; images only every N hours to save chart-img quota.
          # set to 1 to pull images every run (needs a paid chart-img plan).
          IMAGE_EVERY_HOURS: ${{ vars.IMAGE_EVERY_HOURS || '4' }}
        run: node collector.mjs

      - name: Commit results
        run: |
          git config user.name  "smc-bot"
          git config user.email "smc-bot@users.noreply.github.com"
          git add data/latest.json data/history-*.json
          git commit -m "data: refresh $(date -u +%FT%TZ)" || echo "no changes"
          git push
