name: SMC Collector

on:
  schedule:
    - cron: '17 * * * *'   # :17 past each hour — avoids the :00 rush when GitHub throttles hardest
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Write and run collector
        run: |
          cat > collector.mjs <<'COLLECTOR_EOF'
          // ===== SMC ENGINE =====
          // smc.mjs
          // Smart Money Concepts feature detection from raw OHLCV candles.
          // Everything here works off arrays of candles shaped:
          //   { time:<ms>, open:<n>, high:<n>, low:<n>, close:<n>, volume:<n> }
          // ordered oldest -> newest. No external deps.

          // ---------- helpers ----------

          const last = (a) => a[a.length - 1];

          function ema(values, period) {
            if (values.length < period) return [];
            const k = 2 / (period + 1);
            const out = [];
            // seed with simple average of first `period` values
            let prev = values.slice(0, period).reduce((s, v) => s + v, 0) / period;
            out[period - 1] = prev;
            for (let i = period; i < values.length; i++) {
              prev = values[i] * k + prev * (1 - k);
              out[i] = prev;
            }
            return out;
          }

          // Wilder's ATR
          function atr(candles, period = 14) {
            if (candles.length < period + 1) return null;
            const trs = [];
            for (let i = 1; i < candles.length; i++) {
              const c = candles[i], p = candles[i - 1];
              trs.push(Math.max(
                c.high - c.low,
                Math.abs(c.high - p.close),
                Math.abs(c.low - p.close)
              ));
            }
            // Wilder smoothing
            let a = trs.slice(0, period).reduce((s, v) => s + v, 0) / period;
            for (let i = period; i < trs.length; i++) {
              a = (a * (period - 1) + trs[i]) / period;
            }
            return a;
          }

          // ---------- swings (fractal pivots) ----------
          // A swing high at i means high[i] is the highest across [i-n, i+n].
          // Returns [{ idx, price, type:'high'|'low', time }] oldest->newest.
          function swings(candles, n = 2) {
            const out = [];
            for (let i = n; i < candles.length - n; i++) {
              let isHigh = true, isLow = true;
              for (let j = i - n; j <= i + n; j++) {
                if (j === i) continue;
                if (candles[j].high >= candles[i].high) isHigh = false;
                if (candles[j].low <= candles[i].low) isLow = false;
              }
              if (isHigh) out.push({ idx: i, price: candles[i].high, type: 'high', time: candles[i].time });
              if (isLow) out.push({ idx: i, price: candles[i].low, type: 'low', time: candles[i].time });
            }
            return out;
          }

          // ---------- market structure + BOS / CHoCH ----------
          // Walks the alternating swing sequence and records structure breaks.
          // BOS  = break of structure  (continuation: breaks last swing in trend direction)
          // CHoCH = change of character (first break against the prevailing trend)
          function marketStructure(candles, sw) {
            if (sw.length < 2) {
              return { trend: 'undefined', lastBreak: null, events: [] };
            }
            const events = [];
            let trend = 'undefined';
            let lastHigh = null, lastLow = null;

            for (const s of sw) {
              if (s.type === 'high') {
                if (lastHigh && s.price > lastHigh.price) {
                  const kind = trend === 'down' ? 'CHoCH' : 'BOS';
                  events.push({ kind, dir: 'bullish', price: lastHigh.price, brokenAt: s.time });
                  trend = 'up';
                }
                lastHigh = s;
              } else {
                if (lastLow && s.price < lastLow.price) {
                  const kind = trend === 'up' ? 'CHoCH' : 'BOS';
                  events.push({ kind, dir: 'bearish', price: lastLow.price, brokenAt: s.time });
                  trend = 'down';
                }
                lastLow = s;
              }
            }
            return { trend, lastBreak: last(events) || null, events: events.slice(-6) };
          }

          // ---------- fair value gaps (3-candle imbalance) ----------
          // Bullish FVG: low[i] > high[i-2]  -> gap between high[i-2] and low[i]
          // Bearish FVG: high[i] < low[i-2]  -> gap between high[i] and low[i-2]
          // Reports only gaps not yet fully filled by later price.
          function fairValueGaps(candles) {
            const gaps = [];
            for (let i = 2; i < candles.length; i++) {
              const a = candles[i - 2], c = candles[i];
              if (c.low > a.high) gaps.push({ dir: 'bullish', top: c.low, bottom: a.high, idx: i, time: c.time });
              else if (c.high < a.low) gaps.push({ dir: 'bearish', top: a.low, bottom: c.high, idx: i, time: c.time });
            }
            // keep unfilled: no later candle has traded fully through the gap
            const unfilled = gaps.filter((g) => {
              for (let k = g.idx + 1; k < candles.length; k++) {
                if (g.dir === 'bullish' && candles[k].low <= g.bottom) return false;
                if (g.dir === 'bearish' && candles[k].high >= g.top) return false;
              }
              return true;
            });
            return unfilled.slice(-5);
          }

          // ---------- order blocks ----------
          // Bullish OB: last down-close candle before an up-move that breaks the prior swing high.
          // Bearish OB: last up-close candle before a down-move that breaks the prior swing low.
          // Simplified but practical: anchored to the candle before the impulse leg.
          function orderBlocks(candles, sw) {
            const obs = [];
            const highs = sw.filter((s) => s.type === 'high');
            const lows = sw.filter((s) => s.type === 'low');

            // bullish OB: find a swing low, then the down candle just before price rallied off it
            for (const lo of lows.slice(-4)) {
              let obIdx = lo.idx;
              for (let k = lo.idx; k >= Math.max(0, lo.idx - 5); k--) {
                if (candles[k].close < candles[k].open) { obIdx = k; break; }
              }
              obs.push({ dir: 'bullish', top: candles[obIdx].high, bottom: candles[obIdx].low, time: candles[obIdx].time });
            }
            // bearish OB: find a swing high, then the up candle just before price dropped off it
            for (const hi of highs.slice(-4)) {
              let obIdx = hi.idx;
              for (let k = hi.idx; k >= Math.max(0, hi.idx - 5); k--) {
                if (candles[k].close > candles[k].open) { obIdx = k; break; }
              }
              obs.push({ dir: 'bearish', top: candles[obIdx].high, bottom: candles[obIdx].low, time: candles[obIdx].time });
            }
            return obs.slice(-6);
          }

          // ---------- liquidity pools ----------
          // Equal highs / equal lows (clustered swing levels) = resting liquidity.
          // tol is fraction of price (e.g. 0.001 = 0.1%).
          function liquidity(sw, tol = 0.0015) {
            const cluster = (arr) => {
              const groups = [];
              for (const s of arr) {
                const g = groups.find((gr) => Math.abs(gr.price - s.price) / gr.price <= tol);
                if (g) { g.count++; g.price = (g.price + s.price) / 2; }
                else groups.push({ price: s.price, count: 1, time: s.time });
              }
              return groups.filter((g) => g.count >= 2);
            };
            return {
              equalHighs: cluster(sw.filter((s) => s.type === 'high')).slice(-4),
              equalLows: cluster(sw.filter((s) => s.type === 'low')).slice(-4),
            };
          }

          // ---------- top-level analyse ----------
          function analyse(candles, { swingN = 2 } = {}) {
            if (!candles || candles.length < 30) {
              return { error: 'not enough candles', count: candles ? candles.length : 0 };
            }
            const closes = candles.map((c) => c.close);
            const price = last(candles).close;
            const sw = swings(candles, swingN);

            const e20 = ema(closes, 20);
            const e50 = ema(closes, 50);
            const e200 = ema(closes, 200);
            const v20 = last(e20), v50 = last(e50), v200 = last(e200);

            let stack = 'mixed';
            if (v20 != null && v50 != null && v200 != null) {
              if (v20 > v50 && v50 > v200) stack = 'bullish';       // 20>50>200
              else if (v20 < v50 && v50 < v200) stack = 'bearish';   // 20<50<200
            }

            const ms = marketStructure(candles, sw);
            const a = atr(candles, 14);

            return {
              price,
              atr: a,
              atrPct: a != null ? +(a / price * 100).toFixed(2) : null,
              structure: ms,
              ema: {
                e20: v20 ?? null, e50: v50 ?? null, e200: v200 ?? null,
                stack,
                priceVsE200: v200 != null ? (price > v200 ? 'above' : 'below') : null,
              },
              orderBlocks: orderBlocks(candles, sw),
              fvgs: fairValueGaps(candles),
              liquidity: liquidity(sw),
              swingsRecent: sw.slice(-6),
            };
          }

          // ===== COLLECTOR =====
          // collector.mjs — data-only SMC collector (Hyperliquid)
          // Every run: fetch OHLCV per coin/timeframe, compute SMC features, attach
          // liquidity (24h turnover), funding rate and open interest, write data/latest.json.
          // No chart images — the desk is data-driven.

          import { writeFile, mkdir } from 'node:fs/promises';

          // ----------------------------------------------------------------------------
          // CONFIG
          // ----------------------------------------------------------------------------
          // hlCoin must match the perp name on Hyperliquid (app.hyperliquid.xyz).
          // Note: HL prefixes some low-priced tokens with "k" (kPEPE = 1000 PEPE).
          const SYMBOLS = [
            'BTC', 'ETH', 'SOL', 'HYPE', 'XRP', 'SUI', 'LINK', 'DOGE', 'ENA', 'AAVE',
            'TAO', 'ONDO', 'AVAX', 'ADA', 'BNB', 'FARTCOIN', 'WIF', 'UNI', 'LTC',
          ].map((name) => ({ name, hlCoin: name }));

          const TIMEFRAMES = [
            { label: '1h', hl: '1h' },
            { label: '4h', hl: '4h' },
            { label: '1D', hl: '1d' },
          ];

          const CANDLE_LIMIT = 300;          // enough for EMA200 + structure history
          const PACE_MS = 120;               // gap between candle requests (rate-limit safety)
          const MOCK = process.argv.includes('--mock');

          const HL_URL = 'https://api.hyperliquid.xyz/info';
          const IV_MS = { '1h': 3600e3, '4h': 4 * 3600e3, '1d': 24 * 3600e3 };
          const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

          // ----------------------------------------------------------------------------
          // FETCHERS
          // ----------------------------------------------------------------------------
          async function hlPost(body, tries = 3) {
            for (let i = 0; i < tries; i++) {
              try {
                const res = await fetch(HL_URL, {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify(body),
                });
                if (res.status === 429) { await sleep(1000 * (i + 1)); continue; } // backoff
                if (!res.ok) throw new Error(`hyperliquid ${res.status}`);
                return await res.json();
              } catch (e) {
                if (i === tries - 1) throw e;
                await sleep(400 * (i + 1));
              }
            }
          }

          async function fetchCandles(hlCoin, hlInterval) {
            const endTime = Date.now();
            const startTime = endTime - CANDLE_LIMIT * (IV_MS[hlInterval] || 3600e3);
            const rows = await hlPost({
              type: 'candleSnapshot',
              req: { coin: hlCoin, interval: hlInterval, startTime, endTime },
            });
            if (!Array.isArray(rows) || !rows.length) throw new Error(`no candles for ${hlCoin} ${hlInterval}`);
            // row: { t, T, o, h, l, c, v, n } — oldest first
            return rows.map((r) => ({
              time: +r.t, open: +r.o, high: +r.h, low: +r.l, close: +r.c, volume: +r.v,
            }));
          }

          // one call for ALL perps -> { coin: { turnover24h, oiValue, funding..., lastPrice } }
          async function fetchTickers() {
            const data = await hlPost({ type: 'metaAndAssetCtxs' });
            const universe = data?.[0]?.universe ?? [];
            const ctxs = data?.[1] ?? [];
            const map = {};
            universe.forEach((u, i) => {
              const c = ctxs[i] || {};
              const mark = +c.markPx || +c.oraclePx || 0;
              const fundingHr = +c.funding || 0;              // Hyperliquid funding is per HOUR
              map[u.name] = {
                turnover24h: +c.dayNtlVlm || 0,               // 24h notional traded (USD)
                openInterestBase: +c.openInterest || 0,       // in base units
                oiValue: (+c.openInterest || 0) * mark,       // in USD
                fundingHourly: fundingHr,                     // raw rate, e.g. 0.0000125
                fundingHourlyPct: +(fundingHr * 100).toFixed(5),
                fundingAnnualPct: +(fundingHr * 24 * 365 * 100).toFixed(2),
                prevDayPx: +c.prevDayPx || 0,
                lastPrice: mark,
              };
            });
            return map;
          }

          // ----------------------------------------------------------------------------
          // MOCK candles (offline pipeline test)
          // ----------------------------------------------------------------------------
          function mockCandles(seed = 1) {
            const out = [];
            let price = 100 * seed, t = Date.now() - CANDLE_LIMIT * 4 * 3600e3;
            for (let i = 0; i < CANDLE_LIMIT; i++) {
              const drift = i < 150 ? 0.4 : i < 220 ? -0.6 : 0.8;
              const noise = (Math.sin(i * 0.7 + seed) + Math.cos(i * 0.31)) * 0.9;
              const open = price, close = price + drift + noise;
              out.push({
                time: t + i * 4 * 3600e3, open,
                high: Math.max(open, close) + Math.abs(noise) * 0.6 + 0.3,
                low: Math.min(open, close) - Math.abs(noise) * 0.6 - 0.3,
                close, volume: 1000 + i,
              });
              price = close;
            }
            return out;
          }

          // ----------------------------------------------------------------------------
          // MAIN
          // ----------------------------------------------------------------------------
          async function run() {
            const startedAt = new Date().toISOString();
            const results = [];

            let tickers = {};
            if (!MOCK) {
              try { tickers = await fetchTickers(); }
              catch (e) { console.error('tickers fetch failed:', e.message); }
            }

            // warn about coins that aren't listed on Hyperliquid
            if (!MOCK && Object.keys(tickers).length) {
              const missing = SYMBOLS.filter((s) => !tickers[s.hlCoin]).map((s) => s.hlCoin);
              if (missing.length) console.error('NOT ON HYPERLIQUID (will error):', missing.join(', '));
            }

            for (const [si, sym] of SYMBOLS.entries()) {
              const perTf = {};
              for (const tf of TIMEFRAMES) {
                try {
                  const candles = MOCK ? mockCandles(si + 1) : await fetchCandles(sym.hlCoin, tf.hl);
                  perTf[tf.label] = { smc: analyse(candles), candleCount: candles.length };
                } catch (e) {
                  perTf[tf.label] = { error: String(e.message || e) };
                }
                if (!MOCK) await sleep(PACE_MS);   // pace requests
              }

              const trends = TIMEFRAMES.map((tf) => perTf[tf.label]?.smc?.structure?.trend).filter(Boolean);
              const bull = trends.filter((t) => t === 'up').length;
              const bear = trends.filter((t) => t === 'down').length;
              const bias = bull > bear ? 'bullish' : bear > bull ? 'bearish' : 'mixed';

              const tk = tickers[sym.hlCoin];
              const turnover24h = MOCK ? 5e8 : (tk?.turnover24h ?? null);
              const tier = turnover24h == null ? 'unknown'
                : turnover24h >= 1e9 ? 'high'
                : turnover24h >= 1e8 ? 'mid' : 'low';

              results.push({
                symbol: sym.name,
                bias,
                liquidity: { turnover24h, oiValue: MOCK ? 2e8 : (tk?.oiValue ?? null), tier },
                derivs: tk ? {
                  fundingHourlyPct: tk.fundingHourlyPct,
                  fundingAnnualPct: tk.fundingAnnualPct,
                  openInterestUsd: tk.oiValue,
                  markPrice: tk.lastPrice,
                  change24hPct: tk.prevDayPx ? +(((tk.lastPrice - tk.prevDayPx) / tk.prevDayPx) * 100).toFixed(2) : null,
                } : null,
                timeframes: perTf,
              });
            }

            const payload = { generatedAt: startedAt, mock: MOCK, symbols: results };
            await mkdir('./data', { recursive: true });
            await writeFile('./data/latest.json', JSON.stringify(payload, null, 2));

            console.log(`Wrote data/latest.json — ${results.length} symbols @ ${startedAt}`);
            for (const r of results) {
              const f = r.derivs ? `${r.derivs.fundingAnnualPct > 0 ? '+' : ''}${r.derivs.fundingAnnualPct}%/yr` : 'n/a';
              console.log(`  ${r.symbol.padEnd(9)} ${r.bias.padEnd(8)} ${(r.liquidity.tier || '?').padEnd(7)} fund ${f.padEnd(12)} ` +
                TIMEFRAMES.map((tf) => `${tf.label}:${r.timeframes[tf.label]?.smc?.structure?.trend ?? 'ERR'}`).join(' '));
            }
          }

          run().catch((e) => { console.error('FATAL', e); process.exit(1); });
          COLLECTOR_EOF
          node collector.mjs
      - name: Commit results
        run: |
          git config user.name  "smc-bot"
          git config user.email "smc-bot@users.noreply.github.com"
          git add data/latest.json
          git commit -m "data: refresh $(date -u +%FT%TZ)" || echo "no changes"
          git push
